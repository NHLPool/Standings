<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Puck Pool — NHL Fantasy League Tracker. Live standings for the 2025-26 season.">
<title>Puck Pool — NHL Fantasy League</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --surface: #0f1e35;
    --card: #162a46;
    --card2: #1a3152;
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-bright: #60a5fa;
    --gold: #f59e0b;
    --silver: #9ca3af;
    --bronze: #cd7f32;
    --green: #22c55e;
    --red: #ef4444;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding-bottom: 4rem;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .logo {
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-weight: 800;
    font-size: 1.55rem;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    letter-spacing: 0.02em;
    text-decoration: none;
  }

  .puck {
    width: 26px; height: 13px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .header-right { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-season {
    background: rgba(59,130,246,0.12);
    color: var(--accent-bright);
    border: 1px solid rgba(59,130,246,0.25);
  }

  .badge-live {
    background: rgba(34,197,94,0.12);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.25);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  /* ── ANIMATIONS ── */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  @keyframes spin  { to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 1.75rem 1.25rem;
  }

  .section-label {
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .last-updated { font-size: 0.7rem; color: var(--muted); }
  .data-source  { font-size: 0.65rem; color: var(--muted); opacity: 0.55; }

  /* ── PODIUM ── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1.08fr 1fr;
    gap: 10px;
    margin-bottom: 2rem;
    align-items: end;
  }

  .podium-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 0.85rem;
    text-align: center;
    animation: fadeIn 0.4s ease both;
    transition: transform 0.18s, box-shadow 0.18s;
  }

  .podium-card:hover { transform: translateY(-3px); }
  .podium-card.first { border-color: rgba(245,158,11,0.45); padding-top: 1.4rem; }
  .podium-card.second { border-color: rgba(156,163,175,0.3); }
  .podium-card.third  { border-color: rgba(205,127,50,0.3); }

  .podium-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .first  .podium-rank { color: var(--gold); }
  .second .podium-rank { color: var(--silver); }
  .third  .podium-rank { color: var(--bronze); }

  .podium-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    color: #fff;
    margin-bottom: 0.15rem;
    letter-spacing: 0.03em;
  }

  .podium-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--accent-bright);
    line-height: 1.1;
  }

  .podium-pts-label {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  .podium-teams {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 0.55rem;
    flex-wrap: wrap;
  }

  .mini-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.62rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  /* ── LEADERBOARD ── */
  .leaderboard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }

  .lb-grid {
    display: grid;
    grid-template-columns: 36px 1fr 72px 72px 72px 70px;
    gap: 6px;
    align-items: center;
  }

  .lb-header {
    padding: 0.55rem 1.2rem;
    background: var(--surface);
    font-size: 0.64rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .lb-row {
    padding: 0.7rem 1.2rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    animation: fadeIn 0.35s ease both;
  }

  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(255,255,255,0.025); }
  .lb-row.extras { opacity: 0.48; }

  .rank-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--muted);
    text-align: center;
  }
  .rank-cell.top { color: #fff; }

  .player-name {
    font-weight: 500;
    font-size: 0.92rem;
    color: #fff;
    line-height: 1.2;
  }

  .player-chips {
    display: flex;
    gap: 3px;
    margin-top: 3px;
    flex-wrap: wrap;
  }

  .team-chip {
    font-size: 0.58rem;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    letter-spacing: 0.03em;
  }

  .pts-cell {
    text-align: right;
    font-size: 0.8rem;
    color: var(--text);
  }

  .pts-cell .pt-abbr {
    font-size: 0.58rem;
    color: var(--muted);
    display: block;
    line-height: 1;
    margin-bottom: 1px;
    letter-spacing: 0.03em;
  }

  .total-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--accent-bright);
    text-align: right;
  }

  .extras-tag {
    font-size: 0.58rem;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(148,163,184,0.08);
    color: var(--muted);
    border: 1px solid var(--border);
    margin-left: 5px;
    vertical-align: middle;
  }

  /* ── TEAM GRID ── */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(122px, 1fr));
    gap: 9px;
  }

  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 0.7rem;
    text-align: center;
    transition: transform 0.15s, border-color 0.15s;
    animation: fadeIn 0.3s ease both;
  }

  .team-card:hover {
    transform: translateY(-2px);
    border-color: rgba(59,130,246,0.3);
  }

  .team-abbr {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    color: #fff;
    letter-spacing: 0.04em;
  }

  .team-name {
    font-size: 0.58rem;
    color: var(--muted);
    margin: 2px 0 8px;
    line-height: 1.35;
  }

  .team-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--accent-bright);
    line-height: 1;
  }

  .team-record {
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .team-owner {
    font-size: 0.58rem;
    color: var(--accent-bright);
    margin-top: 4px;
    opacity: 0.75;
  }

  /* ── STATES ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem;
    gap: 0.9rem;
    color: var(--muted);
    text-align: center;
  }

  .spinner {
    width: 34px; height: 34px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }

  .state-sub { font-size: 0.75rem; opacity: 0.7; }

  .error-box {
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.18);
    border-radius: 10px;
    padding: 1.5rem;
    color: #fca5a5;
    font-size: 0.85rem;
    text-align: center;
    line-height: 1.65;
    margin: 2rem 0;
  }

  .error-box strong { display: block; margin-bottom: 0.4rem; font-size: 0.95rem; }

  .retry-btn {
    display: inline-block;
    margin-top: 0.9rem;
    padding: 6px 18px;
    border-radius: 6px;
    border: 1px solid rgba(239,68,68,0.3);
    background: transparent;
    color: #fca5a5;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: inherit;
    transition: background 0.15s;
  }
  .retry-btn:hover { background: rgba(239,68,68,0.1); }

  /* ── RESPONSIVE ── */
  @media (max-width: 620px) {
    .lb-grid { grid-template-columns: 30px 1fr 62px 62px; }
    .col-hide { display: none; }
    .podium { grid-template-columns: 1fr; gap: 8px; }
    .podium-card.first { padding-top: 1rem; }
    header { padding: 0.9rem 1rem; }
    .badge-season { display: none; }
  }
</style>
</head>
<body>

<header>
  <span class="logo"><span class="puck"></span>Puck Pool</span>
  <div class="header-right">
    <span class="badge badge-season">2025–26 NHL Season</span>
    <span class="badge badge-live"><span class="live-dot"></span>Live</span>
  </div>
</header>

<main>
  <div id="app">
    <div class="state-box">
      <div class="spinner"></div>
      <div>Loading standings…</div>
    </div>
  </div>
</main>

<script>
'use strict';

/* ── LEAGUE CONFIG ── */
const LEAGUE = [
  { name: 'Ian',   teams: ['COL','OTT','DET'] },
  { name: 'Will',  teams: ['DAL','STL','BOS'] },
  { name: 'Dave',  teams: ['VGK','MTL','PHI'] },
  { name: 'Dan',   teams: ['CAR','NYR','CBJ'] },
  { name: 'Monti', teams: ['WSH','BUF','NYI'] },
  { name: 'Soap',  teams: ['TBL','MIN','SEA'] },
  { name: 'Corey', teams: ['EDM','VAN','ANA'] },
  { name: 'Schum', teams: ['FLA','UTA','CHI'] },
  { name: 'Paul',  teams: ['TOR','LAK','CGY'] },
  { name: 'Henry', teams: ['WPG','NJD','NSH'] },
  { name: 'Extras', teams: ['PIT','SJS'], extras: true },
];

const TEAMS = {
  COL:'Colorado Avalanche',   OTT:'Ottawa Senators',
  DET:'Detroit Red Wings',    DAL:'Dallas Stars',
  STL:'St. Louis Blues',      BOS:'Boston Bruins',
  VGK:'Vegas Golden Knights', MTL:'Montreal Canadiens',
  PHI:'Philadelphia Flyers',  CAR:'Carolina Hurricanes',
  NYR:'New York Rangers',     CBJ:'Columbus Blue Jackets',
  WSH:'Washington Capitals',  BUF:'Buffalo Sabres',
  NYI:'New York Islanders',   TBL:'Tampa Bay Lightning',
  MIN:'Minnesota Wild',       SEA:'Seattle Kraken',
  EDM:'Edmonton Oilers',      VAN:'Vancouver Canucks',
  ANA:'Anaheim Ducks',        FLA:'Florida Panthers',
  UTA:'Utah Mammoth',         CHI:'Chicago Blackhawks',
  TOR:'Toronto Maple Leafs',  LAK:'Los Angeles Kings',
  CGY:'Calgary Flames',       WPG:'Winnipeg Jets',
  NJD:'New Jersey Devils',    NSH:'Nashville Predators',
  PIT:'Pittsburgh Penguins',  SJS:'San Jose Sharks',
};

/* NHL name → our abbreviation (handles API variations) */
const NAME_TO_ABBR = {
  'Colorado Avalanche':'COL','Ottawa Senators':'OTT','Detroit Red Wings':'DET',
  'Dallas Stars':'DAL','St. Louis Blues':'STL','Boston Bruins':'BOS',
  'Vegas Golden Knights':'VGK','Montreal Canadiens':'MTL','Montréal Canadiens':'MTL',
  'Philadelphia Flyers':'PHI','Carolina Hurricanes':'CAR','New York Rangers':'NYR',
  'Columbus Blue Jackets':'CBJ','Washington Capitals':'WSH','Buffalo Sabres':'BUF',
  'New York Islanders':'NYI','Tampa Bay Lightning':'TBL','Minnesota Wild':'MIN',
  'Seattle Kraken':'SEA','Edmonton Oilers':'EDM','Vancouver Canucks':'VAN',
  'Anaheim Ducks':'ANA','Florida Panthers':'FLA','Utah Mammoth':'UTA',
  'Chicago Blackhawks':'CHI','Toronto Maple Leafs':'TOR','Los Angeles Kings':'LAK',
  'Calgary Flames':'CGY','Winnipeg Jets':'WPG','New Jersey Devils':'NJD',
  'Nashville Predators':'NSH','Pittsburgh Penguins':'PIT','San Jose Sharks':'SJS',
};

/* ── STATE ── */
let teamPts = {}, teamRec = {}, proxyUsed = '';

/* ── DATA FETCHING ── */
const NHL_URL = 'https://api-web.nhle.com/v1/standings/now';

const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function tryProxy(proxyFn, url) {
  const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(9000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchStandings() {
  let lastErr;
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const data = await tryProxy(PROXIES[i], NHL_URL);
      if (!data?.standings?.length) throw new Error('Empty response');

      teamPts = {}; teamRec = {};
      for (const s of data.standings) {
        let abbr = s.teamAbbrev?.default;
        if (!abbr || !TEAMS[abbr]) {
          abbr = NAME_TO_ABBR[s.teamName?.default] || NAME_TO_ABBR[s.teamCommonName?.default];
        }
        if (!abbr || !TEAMS[abbr]) continue;
        teamPts[abbr] = s.points ?? (s.wins * 2 + (s.otLosses ?? 0));
        teamRec[abbr]  = { w: s.wins ?? 0, l: s.losses ?? 0, otl: s.otLosses ?? 0 };
      }

      if (Object.keys(teamPts).length < 20) throw new Error('Too few teams returned');
      proxyUsed = ['allorigins','corsproxy','codetabs'][i];
      return;
    } catch (e) {
      lastErr = e;
    }
  }
  throw new Error(lastErr?.message || 'All proxies failed');
}

/* ── HELPERS ── */
const total = p => p.teams.reduce((s, t) => s + (teamPts[t] ?? 0), 0);

function ranked() {
  return [...LEAGUE]
    .filter(p => !p.extras)
    .sort((a, b) => total(b) - total(a))
    .map((p, i) => ({ ...p, rank: i + 1 }));
}

const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') el.className = v;
    else if (k === 'style') el.style.cssText = v;
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.append(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
};

/* ── RENDER ── */
function buildApp() {
  const players = ranked();
  const extras  = LEAGUE.find(p => p.extras);
  const top3    = players.slice(0, 3);
  const now     = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

  const app = document.getElementById('app');
  app.innerHTML = '';
  app.style.animation = 'fadeIn 0.3s ease';

  /* meta row */
  app.append(
    h('div', { class: 'meta-row' },
      h('div', { class: 'last-updated' }, `Updated ${now} · auto-refreshes every 10 min`),
      h('div', { class: 'data-source'  }, `via ${proxyUsed}`)
    )
  );

  /* podium */
  app.append(h('div', { class: 'section-label' }, 'Top 3'));
  app.append(
    h('div', { class: 'podium' },
      makePodiumCard(top3[1], 'second'),
      makePodiumCard(top3[0], 'first'),
      makePodiumCard(top3[2], 'third')
    )
  );

  /* leaderboard */
  app.append(h('div', { class: 'section-label' }, 'Full Standings'));
  const lb = h('div', { class: 'leaderboard' });

  lb.append(
    h('div', { class: 'lb-grid lb-header' },
      h('div', {}, '#'),
      h('div', {}, 'Player'),
      h('div', { style: 'text-align:right' }, 'Team 1'),
      h('div', { style: 'text-align:right' }, 'Team 2'),
      h('div', { class: 'col-hide', style: 'text-align:right' }, 'Team 3'),
      h('div', { style: 'text-align:right' }, 'Total')
    )
  );

  for (const p of players) lb.append(makeRow(p, false));
  if (extras) lb.append(makeRow(extras, true));
  app.append(lb);

  /* team grid */
  app.append(
    h('div', { class: 'section-label', style: 'margin-top:2.5rem' }, 'All Teams — Points This Season')
  );
  app.append(
    h('div', { class: 'team-grid' },
      ...Object.keys(TEAMS).map(makeTeamCard)
    )
  );
}

function makePodiumCard(p, cls) {
  if (!p) return h('div', {});
  const emoji = { first: '🥇', second: '🥈', third: '🥉' }[cls];
  return h('div', { class: `podium-card ${cls}` },
    h('div', { class: 'podium-rank' }, emoji),
    h('div', { class: 'podium-name' }, p.name),
    h('div', { class: 'podium-pts'  }, `${total(p)}`),
    h('div', { class: 'podium-pts-label' }, 'pts'),
    h('div', { class: 'podium-teams' },
      ...p.teams.map(t =>
        h('span', { class: 'mini-chip' }, `${t} ${teamPts[t] ?? '—'}`)
      )
    )
  );
}

function makeRow(p, isExtras) {
  const pts   = p.teams.map(t => teamPts[t] ?? 0);
  const medal = p.rank === 1 ? '🥇' : p.rank === 2 ? '🥈' : p.rank === 3 ? '🥉' : String(p.rank ?? '—');

  const nameEl = h('div', { class: 'player-name' }, p.name);
  if (isExtras) nameEl.append(h('span', { class: 'extras-tag' }, 'unowned'));

  return h('div', { class: `lb-grid lb-row${isExtras ? ' extras' : ''}` },
    h('div', { class: `rank-cell${p.rank <= 3 ? ' top' : ''}` }, medal),
    h('div', {},
      nameEl,
      h('div', { class: 'player-chips' },
        ...p.teams.map(t => h('span', { class: 'team-chip' }, t))
      )
    ),
    h('div', { class: 'pts-cell' },
      h('span', { class: 'pt-abbr' }, p.teams[0]),
      String(pts[0])
    ),
    h('div', { class: 'pts-cell' },
      h('span', { class: 'pt-abbr' }, p.teams[1]),
      String(pts[1])
    ),
    h('div', { class: 'pts-cell col-hide' },
      h('span', { class: 'pt-abbr' }, p.teams[2] ?? '—'),
      String(pts[2] ?? '—')
    ),
    h('div', { class: 'total-cell', style: isExtras ? 'color:var(--muted)' : '' },
      String(total(p))
    )
  );
}

function makeTeamCard(abbr) {
  const pts   = teamPts[abbr] ?? '—';
  const rec   = teamRec[abbr];
  const owner = LEAGUE.find(p => p.teams.includes(abbr));
  const ownerLabel = owner ? (owner.extras ? 'Extras' : owner.name) : '';

  return h('div', { class: 'team-card' },
    h('div', { class: 'team-abbr' }, abbr),
    h('div', { class: 'team-name'  }, TEAMS[abbr]),
    h('div', { class: 'team-pts'   }, String(pts)),
    rec ? h('div', { class: 'team-record' }, `${rec.w}-${rec.l}-${rec.otl}`) : null,
    ownerLabel ? h('div', { class: 'team-owner' }, ownerLabel) : null
  );
}

/* ── INIT ── */
async function init() {
  document.getElementById('app').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div>Fetching NHL standings…</div>
      <div class="state-sub">Trying data sources…</div>
    </div>`;

  try {
    await fetchStandings();
    buildApp();
    setTimeout(init, 10 * 60 * 1000); /* refresh every 10 min */
  } catch (err) {
    document.getElementById('app').innerHTML = '';
    const box = h('div', { class: 'error-box' },
      h('strong', {}, 'Could not load standings'),
      `${err.message}. All CORS proxies may be temporarily down — this is common on free services. Try again in a moment.`,
      h('br', {}),
      h('button', { class: 'retry-btn', onclick: 'init()' }, '↺ Retry')
    );
    document.getElementById('app').append(box);
  }
}

init();
</script>
</body>
</html>
